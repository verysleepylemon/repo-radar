<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Monitor — repo-radar</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; color: #e0e6f0; font-family: 'Courier New', monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    header {
      background: #0d1117;
      border-bottom: 1px solid #1e3a5f;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      z-index: 1000;
      flex-shrink: 0;
    }
    .logo { color: #58a6ff; font-size: 1.1rem; font-weight: bold; letter-spacing: 2px; }
    .stats { display: flex; gap: 18px; font-size: 0.73rem; color: #8b949e; }
    .stat-val { color: #58a6ff; font-weight: bold; }

    .filters { margin-left: auto; display: flex; gap: 8px; align-items: center; }
    .filter-btn {
      background: #161b22;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 4px 12px;
      cursor: pointer;
      font-size: 0.73rem;
      border-radius: 3px;
      font-family: 'Courier New', monospace;
      transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: #58a6ff;
      color: #58a6ff;
      background: rgba(88,166,255,0.08);
    }
    .filter-btn.active.critical { border-color: #ff4444; color: #ff4444; background: rgba(255,68,68,0.08); }
    .filter-btn.active.github-f { border-color: #f0c040; color: #f0c040; background: rgba(240,192,64,0.08); }

    .refresh-info { font-size: 0.65rem; color: #565f6a; white-space: nowrap; }
    .back-link {
      color: #58a6ff;
      text-decoration: none;
      font-size: 0.73rem;
      padding: 4px 10px;
      border: 1px solid #1e3a5f;
      border-radius: 3px;
      transition: background 0.2s;
    }
    .back-link:hover { background: rgba(88,166,255,0.08); }

    .main { display: flex; flex: 1; overflow: hidden; }

    #sidebar {
      width: 310px;
      background: #0d1117;
      border-right: 1px solid #1e3a5f;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 8px 15px;
      border-bottom: 1px solid #1e3a5f;
      font-size: 0.65rem;
      color: #565f6a;
      text-transform: uppercase;
      letter-spacing: 1px;
      background: #0a0a0f;
      flex-shrink: 0;
    }
    #event-list { overflow-y: auto; flex: 1; }
    .event-item {
      padding: 9px 14px;
      border-bottom: 1px solid #0d1117;
      cursor: pointer;
      transition: background 0.15s;
    }
    .event-item:hover { background: #161b22; }
    .event-badge {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 3px;
    }
    .event-item.ev-critical .event-badge { color: #ff6060; }
    .event-item.ev-news .event-badge { color: #58a6ff; }
    .event-item.ev-github .event-badge { color: #f0c040; }
    .event-title { font-size: 0.77rem; line-height: 1.4; color: #c9d1d9; margin-bottom: 3px; }
    .event-meta { font-size: 0.63rem; color: #565f6a; }

    #map { flex: 1; background: #0a0a0f; }

    .legend {
      background: rgba(13,17,23,0.92) !important;
      border: 1px solid #1e3a5f !important;
      border-radius: 2px;
      padding: 8px 13px;
      font-size: 0.7rem;
      color: #8b949e;
      font-family: 'Courier New', monospace;
    }
    .legend-row { display: flex; align-items: center; gap: 8px; margin: 3px 0; }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

    .empty-state { padding: 30px 15px; text-align: center; color: #565f6a; font-size: 0.75rem; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0a0a0f; }
    ::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 2px; }
  </style>
</head>
<body>

<header>
  <div class="logo">◈ WORLD MONITOR</div>
  <div class="stats">
    <span>EVENTS <span class="stat-val" id="stat-total">—</span></span>
    <span>CRITICAL <span class="stat-val" id="stat-critical" style="color:#ff6060">—</span></span>
    <span>COUNTRIES <span class="stat-val" id="stat-countries">—</span></span>
    <span>GITHUB <span class="stat-val" id="stat-github" style="color:#f0c040">—</span></span>
  </div>
  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn critical" data-filter="critical">Critical</button>
    <button class="filter-btn github-f" data-filter="github">GitHub</button>
    <button class="filter-btn" data-filter="news">News</button>
    <span class="refresh-info" id="refresh-info">⟳ —</span>
  </div>
  <a href="/" class="back-link">← Dashboard</a>
</header>

<div class="main">
  <div id="sidebar">
    <div class="sidebar-header">Recent Events &nbsp;·&nbsp; <span id="sidebar-count">0</span> shown</div>
    <div id="event-list"><div class="empty-state">Loading…</div></div>
  </div>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script>
// ─── Map init ──────────────────────────────────────────────────────────────
const map = L.map('map', {
  zoomControl: true,
  attributionControl: true
}).setView([25, 15], 2);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright" style="color:#58a6ff">OpenStreetMap</a> contributors © <a href="https://carto.com" style="color:#58a6ff">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 18
}).addTo(map);

// Legend
const LegendControl = L.Control.extend({
  onAdd() {
    const d = L.DomUtil.create('div', 'legend');
    d.innerHTML = `
      <div class="legend-row"><div class="legend-dot" style="background:#ff6060"></div>Critical Event</div>
      <div class="legend-row"><div class="legend-dot" style="background:#58a6ff"></div>Tech News</div>
      <div class="legend-row"><div class="legend-dot" style="background:#f0c040"></div>GitHub Trending</div>
    `;
    return d;
  }
});
new LegendControl({ position: 'bottomright' }).addTo(map);

// ─── State ─────────────────────────────────────────────────────────────────
let allEvents = [];
let markerLayer = L.layerGroup().addTo(map);
let currentFilter = 'all';

// ─── Helpers ───────────────────────────────────────────────────────────────
function colorFor(item) {
  if (item.kind === 'github') return '#f0c040';
  if (item.tier === 'critical') return '#ff6060';
  return '#58a6ff';
}

function radiusFor(item) {
  const s = item.score || 0;
  if (item.kind === 'github') return Math.max(5, Math.min(13, 5 + s / 120));
  if (item.tier === 'critical') return Math.max(5, Math.min(12, 5 + s / 25));
  return Math.max(4, Math.min(9, 4 + s / 35));
}

function timeAgo(ts) {
  if (!ts) return '';
  const mins = Math.floor((Date.now() / 1000 - ts) / 60);
  if (mins < 2) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs / 24)}d ago`;
}

function filterItems(items, f) {
  if (f === 'critical') return items.filter(i => i.tier === 'critical');
  if (f === 'github') return items.filter(i => i.kind === 'github');
  if (f === 'news') return items.filter(i => i.kind !== 'github');
  return items;
}

function safeText(s) {
  return String(s).replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ─── Render map markers ────────────────────────────────────────────────────
function renderMap(items) {
  markerLayer.clearLayers();
  items.forEach(item => {
    if (!item.lat || !item.lng) return;
    const color = colorFor(item);
    const c = L.circleMarker([item.lat, item.lng], {
      radius: radiusFor(item),
      color: color,
      fillColor: color,
      fillOpacity: 0.6,
      weight: 1.5,
      opacity: 0.9
    });

    const ago = timeAgo(item.time);
    const title = safeText(item.title);
    const source = safeText(item.source);
    const kindLabel = item.kind === 'github'
      ? `<span style="color:#f0c040">⭐ GitHub</span>`
      : item.tier === 'critical'
        ? `<span style="color:#ff6060">🔴 Critical</span>`
        : `<span style="color:#58a6ff">🔵 Tech</span>`;

    c.bindPopup(`
      <div style="font-family:'Courier New',monospace;max-width:285px;line-height:1.3">
        <div style="font-size:0.62rem;margin-bottom:5px">
          ${kindLabel}
          <span style="color:#565f6a;margin-left:6px">${safeText(item.country)}</span>
        </div>
        <div style="font-size:0.83rem;font-weight:600;color:#e0e6f0;margin-bottom:5px">${title}</div>
        <div style="font-size:0.67rem;color:#8b949e;margin-bottom:7px">
          ${source}${item.score != null ? ' · ★' + item.score : ''}${ago ? ' · ' + ago : ''}
        </div>
        <a href="${safeText(item.url)}"
           target="_blank" rel="noopener noreferrer"
           style="color:#58a6ff;font-size:0.7rem;text-decoration:none">
          Open ↗
        </a>
      </div>
    `, { maxWidth: 310 });

    c.addTo(markerLayer);
  });
}

// ─── Render sidebar list ───────────────────────────────────────────────────
function renderSidebar(items) {
  const sorted = [...items]
    .sort((a, b) => (b.score || 0) - (a.score || 0))
    .slice(0, 100);

  document.getElementById('sidebar-count').textContent = sorted.length;

  if (sorted.length === 0) {
    document.getElementById('event-list').innerHTML =
      '<div class="empty-state">No events match this filter.</div>';
    return;
  }

  document.getElementById('event-list').innerHTML = sorted.map(item => {
    const evClass = item.kind === 'github' ? 'ev-github'
      : item.tier === 'critical' ? 'ev-critical'
      : 'ev-news';
    const label = item.kind === 'github' ? '⭐ github'
      : item.tier === 'critical' ? '🔴 critical'
      : '🔵 tech';
    const title = safeText(item.title);
    const url = safeText(item.url);
    const ago = timeAgo(item.time);
    const country = safeText(item.country);
    const source = safeText(item.source);

    return `
      <div class="event-item ${evClass}" onclick="window.open('${url}','_blank','noopener')">
        <div class="event-badge">${label} · ${country}</div>
        <div class="event-title">${title.length > 88 ? title.substring(0, 88) + '…' : title}</div>
        <div class="event-meta">${source}${item.score != null ? ' · ★' + item.score : ''}${ago ? ' · ' + ago : ''}</div>
      </div>`;
  }).join('');
}

// ─── Update stats bar ──────────────────────────────────────────────────────
function updateStats(items) {
  document.getElementById('stat-total').textContent = items.length;
  document.getElementById('stat-critical').textContent =
    items.filter(i => i.tier === 'critical').length;
  document.getElementById('stat-countries').textContent =
    new Set(items.map(i => i.country).filter(Boolean)).size;
  document.getElementById('stat-github').textContent =
    items.filter(i => i.kind === 'github').length;
}

// ─── Apply filter ──────────────────────────────────────────────────────────
function applyFilter() {
  const visible = filterItems(allEvents, currentFilter);
  renderMap(visible);
  renderSidebar(visible);
}

// ─── Load from API ─────────────────────────────────────────────────────────
async function loadEvents() {
  try {
    const r = await fetch('/api/worldevents');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    allEvents = Array.isArray(data) ? data : [];
    updateStats(allEvents);
    applyFilter();
    const t = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    document.getElementById('refresh-info').textContent = `⟳ ${t}`;
  } catch (e) {
    console.error('worldevents fetch error:', e);
    document.getElementById('event-list').innerHTML =
      `<div class="empty-state">Failed to load events.<br>${e.message}</div>`;
  }
}

// ─── Filter buttons ────────────────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    applyFilter();
  });
});

// ─── Boot ──────────────────────────────────────────────────────────────────
loadEvents();
setInterval(loadEvents, 60_000);
</script>
</body>
</html>
