[package]
name = "repo-radar"
version = "0.1.0"
edition = "2021"
description = "Real-time GitHub trend detector � get notified when the next 100k-star repo explodes"
license = "MIT"
repository = "https://github.com/lemwaiping123-eng/repo-radar"
keywords = ["github", "trending", "redis", "monitoring", "notifications"]
categories = ["command-line-utilities", "web-programming"]

[[bin]]
name = "repo-radar"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
redis = { version = "0.25", features = ["tokio-comp", "connection-manager"] }
anyhow = "1"
thiserror = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
clap = { version = "4", features = ["derive", "env"] }
dotenvy = "0.15"
chrono = { version = "0.4", features = ["serde"] }
axum = { version = "0.7", features = ["json"] }
tower-http = { version = "0.5", features = ["cors"] }
futures = "0.3"
regex = "1"
aho-corasick = "1"

[dev-dependencies]
tokio-test = "0.4"
mockito = "1"
